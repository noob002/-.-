<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이스터에그 마스터 클래스</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; transition: transform 0.8s; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; padding-top: 50px; }
        
        /* 거울 모드 스타일 */
        .mirror { transform: scaleX(-1); }

        /* 도망가는 버튼 */
        #runaway-btn { padding: 10px 20px; cursor: pointer; position: relative; transition: 0.2s; }

        /* 떨어지는 요소 (중력 효과) */
        .fall { transform: translateY(100vh) rotate(20deg); opacity: 0; transition: transform 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* 이모지 비 스타일 */
        .drop { position: fixed; top: -50px; font-size: 2rem; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="target">이 사이트엔 비밀이 아주 많습니다</h1>
    <p class="target">'g'를 눌러 중력을 느껴보거나, 'rain'을 타이핑해보세요.</p>
    <p class="target">'m'을 누르면 거울이 나타납니다.</p>
    <button id="runaway-btn">나를 눌러봐!</button>
</div>

<script>
    // 1. 중력 모드 ('g' 키 입력)
    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'g') {
            document.querySelectorAll('.target, #runaway-btn').forEach(el => {
                el.classList.add('fall');
            });
            alert("⚠️ 중력 장치가 고장 났습니다!");
        }

        // 2. 거울 모드 ('m' 키 입력)
        if (e.key.toLowerCase() === 'm') {
            document.body.classList.toggle('mirror');
        }
    });

    // 3. 도망가는 버튼 구현
    const runBtn = document.getElementById('runaway-btn');
    runBtn.addEventListener('mouseover', () => {
        const x = Math.random() * (window.innerWidth - runBtn.clientWidth);
        const y = Math.random() * (window.innerHeight - runBtn.clientHeight);
        runBtn.style.position = 'absolute';
        runBtn.style.left = x + 'px';
        runBtn.style.top = y + 'px';
    });

    // 4. 이모지 비 (특정 단어 'rain' 감지)
    let inputBuffer = "";
    window.addEventListener('keyup', (e) => {
        inputBuffer += e.key;
        if (inputBuffer.includes("rain")) {
            createRain();
            inputBuffer = "";
        }
        if (inputBuffer.length > 10) inputBuffer = inputBuffer.substring(1);
    });

    function createRain() {
        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const drop = document.createElement('div');
                drop.innerText = "💧";
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + "vw";
                drop.style.transition = `top ${Math.random() * 2 + 1}s linear`;
                document.body.appendChild(drop);

                // 애니메이션 트리거
                setTimeout(() => { drop.style.top = "110vh"; }, 10);
                // 제거
                setTimeout(() => { drop.remove(); }, 3000);
            }, i * 100);
        }
    }

    // 5. 콘솔 해킹 애니메이션
    let i = 0;
    const hackMsg = ["Accessing Mainframe...", "Bypassing Firewall...", "Decrypted Data Found!", "Injecting Easter Egg..."];
    setInterval(() => {
        if(window.outerHeight - window.innerHeight > 100) { // 개발자 도구가 열렸을 때
            console.log(`%c[SYSTEM] ${hackMsg[i % 4]}`, "color: #00FF00; background: black;");
            i++;
        }
    }, 1000);

</script>
</body>
</html>
