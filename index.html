<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이스터에그 보물찾기</title>
    <style>
        :root { --bg-color: #f0f0f0; --text-color: #333; }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); transition: all 0.5s; text-align: center; padding-top: 100px; overflow: hidden; }
        
        /* 로고 스타일 (클릭 이스터에그 대상) */
        #logo { font-size: 5rem; cursor: pointer; transition: transform 0.5s; display: inline-block; }
        .spin { transform: rotate(3600deg) scale(2); }

        /* 파티 모드 (특정 단어 입력 시) */
        .party-mode { animation: rainbow 1s infinite; }
        @keyframes rainbow {
            0% { background: #ffadad; } 20% { background: #ffd6a5; }
            40% { background: #fdffb6; } 60% { background: #caffbf; }
            80% { background: #9bf6ff; } 100% { background: #ffadad; }
        }

        /* 숨겨진 힌트 */
        .hint { opacity: 0; color: #aaa; margin-top: 20px; transition: 0.3s; }
        .hint:hover { opacity: 1; }
    </style>
</head>
<body>

    <div id="logo">🎁</div>
    <h1>비밀이 가득한 웹사이트</h1>
    <p>여기에 무엇이 숨겨져 있을까요? 키보드를 두드리거나 마우스를 움직여보세요.</p>
    
    <div class="hint">힌트: 'party'라고 타이핑해보거나, 화살표 키를 조합해보세요.</div>

    <script>
        // 1. 코나미 커맨드 변수
        const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        let konamiIndex = 0;

        // 2. 특정 단어 입력 감지 (party)
        let inputString = "";

        // 3. 로고 클릭 횟수 카운트
        let clickCount = 0;
        const logo = document.getElementById('logo');

        // 키보드 이벤트 리스너
        window.addEventListener('keydown', (e) => {
            // 코나미 커맨드 체크
            if (e.key === konamiCode[konamiIndex]) {
                konamiIndex++;
                if (konamiIndex === konamiCode.length) {
                    document.body.style.filter = document.body.style.filter === 'invert(1)' ? 'none' : 'invert(1)';
                    alert("🎨 색상 반전 모드 가동!");
                    konamiIndex = 0;
                }
            } else { konamiIndex = 0; }

            // 단어 입력 체크 (party)
            inputString += e.key;
            if (inputString.includes("party")) {
                document.body.classList.toggle('party-mode');
                inputString = ""; // 초기화
            }
            if (inputString.length > 10) inputString = inputString.substring(1);
        });

        // 로고 클릭 이스터에그
        logo.addEventListener('click', () => {
            clickCount++;
            if (clickCount === 5) {
                logo.classList.add('spin');
                setTimeout(() => {
                    logo.classList.remove('spin');
                    clickCount = 0;
                    logo.innerText = "🌟";
                }, 2000);
            }
        });

        // 우클릭 방지 및 메시지
        window.oncontextmenu = function() {
            alert("🔒 이스터에그를 찾으러 오셨나요? 소스 코드는 F12에 있습니다!");
            return false; 
        };

        // 콘솔 이스터에그
        console.log("%c비밀 수사대", "color: red; font-size: 30px; font-weight: bold;");
        console.log("여기까지 들어오시다니 대단하군요! 이스터에그 하나를 더 드립니다: 화면 아무데나 더블 클릭 해보세요.");

        // 더블 클릭 시 랜덤 이모지 생성
        window.addEventListener('dblclick', (e) => {
            const emoji = document.createElement('div');
            emoji.innerText = "💎";
            emoji.style.position = 'absolute';
            emoji.style.left = e.pageX + 'px';
            emoji.style.top = e.pageY + 'px';
            emoji.style.fontSize = '2rem';
            document.body.appendChild(emoji);
            
            setTimeout(() => emoji.remove(), 1000);
        });
    </script>
</body>
</html>
